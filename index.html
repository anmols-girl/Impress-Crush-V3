<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./assets/css/index.css">
    <title>Our Magical Love Gallery | Anmol Jaisinghani</title>
</head>
<body>

    <div class="glass-container">
        <h1 class="main-title">Our Love Story</h1>
        <p class="subtitle">Every moment with you feels like magic... ✨</p>

        <a href="https://www.instagram.com/anmol.zsh" target="_blank" class="insta-link">
            Made by Anmol Jaisinghani
        </a>
    </footer>

    <audio id="background-music" loop preload="auto" autoplay="true">
        <source src="assets/song/song.mp3" type="audio/mpeg">
    </audio>

    <script src="./assets/js/index.js"></script>
    <script src="assets/js/script.js"></script>

</html>
